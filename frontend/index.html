<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Core - Панель управления</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .status-panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
        h1 { font-size: 1.2rem; color: #333; }
        p { margin: 10px 0; font-weight: bold; }
        span { float: right; }
    </style>
</head>
<body>

<div class="status-panel">
    <h1>Системная панель</h1>
    <p>Сервер: <span id="server-status" style="color: #2ecc71">ONLINE</span></p>
    <p>RabbitMQ: <span id="rabbit-status">ЗАГРУЗКА...</span></p>
    <p>PostgreSQL: <span id="postgres-status">ЗАГРУЗКА...</span></p>
    <p>Redis: <span id="redis-status">ЗАГРУЗКА...</span></p>
</div>

<script src="dist/app.js"></script>

</body>
</html>
